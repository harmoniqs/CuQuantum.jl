name: GPU Benchmark
on:
  workflow_dispatch:
    inputs:
      instance-type:
        description: 'EC2 instance type'
        required: true
        type: choice
        options:
          - g4dn.xlarge    # NVIDIA T4
          - g5.xlarge      # NVIDIA A10G
          - p4d.24xlarge   # 8x NVIDIA A100
          - p5.48xlarge    # 8x NVIDIA H100
      benchmark-script:
        description: 'Julia benchmark script to run'
        required: false
        default: 'benchmark/run_benchmarks.jl'
        type: string
concurrency:
  group: gpu-benchmark
  cancel-in-progress: false
jobs:
  start-gpu-runner:
    name: Start GPU Runner
    runs-on: ubuntu-latest
    # Gate benchmark runs behind maintainer approval when triggered by non-maintainers.
    environment: ${{ github.actor != 'jack-champagne' && 'gpu-ci' || '' }}
    permissions:
      id-token: write
      contents: read
    outputs:
      label: ${{ steps.start.outputs.label }}
      ec2-instance-id: ${{ steps.start.outputs.ec2-instance-id }}
    timeout-minutes: 10
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_GPU_RUNNER_ROLE_ARN }}
          aws-region: us-east-1
      - name: Start EC2 runner
        id: start
        uses: machulav/ec2-github-runner@v2
        with:
          mode: start
          github-token: ${{ secrets.GH_RUNNER_PAT }}
          ec2-instance-type: ${{ inputs.instance-type }}
          iam-role-name: ${{ secrets.AWS_GPU_RUNNER_INSTANCE_PROFILE }}
          availability-zones-config: ${{ secrets.AWS_GPU_RUNNER_AZ_CONFIG }}
          aws-resource-tags: >-
            [{"Key": "gpu-runner", "Value": "true"},
             {"Key": "Project", "Value": "CuQuantum.jl"},
             {"Key": "Purpose", "Value": "benchmark"}]
          pre-runner-script: |
            curl -fsSL https://install.julialang.org | sh -s -- --yes --default-channel 1.12
            export PATH="$HOME/.juliaup/bin:$PATH"

  benchmark:
    name: Run Benchmarks
    needs: start-gpu-runner
    runs-on: ${{ needs.start-gpu-runner.outputs.label }}
    env:
      JULIA_CUDA_MEMORY_POOL: none
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'
      - uses: julia-actions/cache@v3
      - name: Install dependencies
        run: julia --project=benchmark -e 'using Pkg; Pkg.instantiate()'
      - name: Run benchmarks
        env:
          BENCHMARK_SCRIPT: ${{ inputs.benchmark-script }}
        run: julia --project=benchmark "$BENCHMARK_SCRIPT"
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ inputs.instance-type }}-${{ github.run_number }}
          path: benchmark/results/

  stop-gpu-runner:
    name: Stop GPU Runner
    needs: [start-gpu-runner, benchmark]
    runs-on: ubuntu-latest
    if: always()
    permissions:
      id-token: write
      contents: read
    timeout-minutes: 5
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_GPU_RUNNER_ROLE_ARN }}
          aws-region: us-east-1
      - name: Stop EC2 runner
        uses: machulav/ec2-github-runner@v2
        with:
          mode: stop
          github-token: ${{ secrets.GH_RUNNER_PAT }}
          label: ${{ needs.start-gpu-runner.outputs.label }}
          ec2-instance-id: ${{ needs.start-gpu-runner.outputs.ec2-instance-id }}
