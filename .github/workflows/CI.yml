name: CI
on:
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '*.md'
  push:
    branches:
      - main
    tags: ['*']
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}
jobs:
  build:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.12'
          - '1.10'
          - '1.11'
        os:
          - ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@v3
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
        # GPU-requiring tests are skipped automatically via @gpu_test / @test_skip.
        # This runs module-loading tests and verifies the test infrastructure itself.
        # Full GPU test suite is run on GPU-enabled runners (see gpu-test job below).

  start-gpu-runner:
    name: Start GPU Runner
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository
      || (github.event_name == 'push'
          && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')))
    permissions:
      id-token: write
      contents: read
    outputs:
      label: ${{ steps.start.outputs.label }}
      ec2-instance-id: ${{ steps.start.outputs.ec2-instance-id }}
    timeout-minutes: 10
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GPU_RUNNER_ROLE_ARN }}
          aws-region: us-east-1
      - name: Start EC2 runner
        id: start
        uses: machulav/ec2-github-runner@v2
        with:
          mode: start
          github-token: ${{ secrets.GH_RUNNER_PAT }}
          ec2-instance-type: g4dn.xlarge
          iam-role-name: ${{ secrets.AWS_GPU_RUNNER_INSTANCE_PROFILE }}
          market-type: spot
          # Try multiple AZs for spot capacity resilience.
          # Each entry includes imageId, subnetId, securityGroupId.
          availability-zones-config: ${{ secrets.AWS_GPU_RUNNER_AZ_CONFIG }}
          aws-resource-tags: >-
            [{"Key": "gpu-runner", "Value": "true"},
             {"Key": "Project", "Value": "CuQuantum.jl"}]
          pre-runner-script: |
            curl -fsSL https://install.julialang.org | sh -s -- --yes --default-channel 1.12
            export PATH="$HOME/.juliaup/bin:$PATH"

  gpu-test:
    name: GPU Tests
    needs: start-gpu-runner
    runs-on: ${{ needs.start-gpu-runner.outputs.label }}
    env:
      JULIA_CUDA_MEMORY_POOL: none
      CUDA_VISIBLE_DEVICES: '0'
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'
      - uses: julia-actions/cache@v3
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1

  stop-gpu-runner:
    name: Stop GPU Runner
    needs: [start-gpu-runner, gpu-test]
    runs-on: ubuntu-latest
    if: always()
    permissions:
      id-token: write
      contents: read
    timeout-minutes: 5
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GPU_RUNNER_ROLE_ARN }}
          aws-region: us-east-1
      - name: Stop EC2 runner
        uses: machulav/ec2-github-runner@v2
        with:
          mode: stop
          github-token: ${{ secrets.GH_RUNNER_PAT }}
          label: ${{ needs.start-gpu-runner.outputs.label }}
          ec2-instance-id: ${{ needs.start-gpu-runner.outputs.ec2-instance-id }}
