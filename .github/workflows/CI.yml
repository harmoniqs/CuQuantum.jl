name: CI
on:
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '*.md'
  push:
    branches:
      - main
    tags: ['*']
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}
jobs:
  build:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.12'
          - '1.10'
          - '1.11'
        os:
          - ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@v3
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
        # GPU-requiring tests are skipped automatically via @gpu_test / @test_skip.
        # This runs module-loading tests and verifies the test infrastructure itself.
        # Full GPU test suite is run on GPU-enabled runners (see gpu-test job below).

  gpu-test:
    name: GPU Tests
    runs-on: ubuntu-latest
    # Only run on main branch pushes and tags to avoid burning GPU minutes on PRs.
    # Remove the 'if' to run on PRs as well when self-hosted GPU runners are available.
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'
      - uses: julia-actions/cache@v3
      - uses: julia-actions/julia-buildpkg@v1
      # Placeholder: swap ubuntu-latest for a self-hosted GPU runner label
      # (e.g. runs-on: [self-hosted, gpu, linux]) to actually run GPU tests.
      # For now this job documents the intended CI structure.
      - uses: julia-actions/julia-runtest@v1
