name: CI
on:
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '*.md'
  push:
    branches:
      - main
    tags: ['*']
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}
jobs:
  build:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.12'
          - '1.10'
          - '1.11'
        os:
          - ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@v3
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
        # GPU-requiring tests are skipped automatically via @gpu_test / @test_skip.
        # This runs module-loading tests and verifies the test infrastructure itself.
        # Full GPU test suite is run on GPU-enabled runners (see gpu-test job below).

  gpu-test:
    name: GPU Tests
    # runs-on self-hosted GPU runner via runs-on.com
    # Profile "gpu" is defined in .runs-on.yml at the repo root:
    #   g4dn.xlarge (NVIDIA T4), ubuntu22-gpu-x64 image, spot, 45 min timeout.
    # The first label ("runs-on=${{ github.run_id }}") is required by runs-on to
    # prevent runner-stealing between concurrent jobs.
    runs-on: "runs-on=${{ github.run_id }}/runner=gpu"
    # Only run on main branch pushes and tags to avoid burning GPU minutes on PRs.
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    env:
      # Disable the CUDA memory pool to avoid fragmentation issues in tests
      JULIA_CUDA_MEMORY_POOL: none
      # Ensure only the first GPU is visible (g4dn.xlarge has exactly one T4)
      CUDA_VISIBLE_DEVICES: '0'
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'
      - uses: julia-actions/cache@v3
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
